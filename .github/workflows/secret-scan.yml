name: Secret scan

# Defense-in-depth against committing secrets, complementing GitHub's
# native push protection. Runs gitleaks (which also catches generic /
# non-provider secrets) on every push and pull request.
# Allowlisted false positives are configured in .gitleaks.toml at the repo root.

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
